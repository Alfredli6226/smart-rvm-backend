<!DOCTYPE html>
<html>
<head>
    <title>Backend Test - Combined RVM Platform</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .card { background: #f5f5f5; padding: 20px; margin: 20px 0; border-radius: 8px; }
        .success { color: green; }
        .error { color: red; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔧 RVM Platform Backend Test</h1>
    <p>Testing our combined backend APIs...</p>
    
    <div class="card">
        <h2>1. Health Check</h2>
        <button onclick="testHealth()">Test Health API</button>
        <div id="health-result"></div>
    </div>
    
    <div class="card">
        <h2>2. Users API (Our Combined Backend)</h2>
        <button onclick="testUsers()">Test Users API</button>
        <div id="users-result"></div>
    </div>
    
    <div class="card">
        <h2>3. Machine Status</h2>
        <button onclick="testMachines()">Test Machine Status</button>
        <div id="machines-result"></div>
    </div>
    
    <script>
        async function testHealth() {
            const result = document.getElementById('health-result');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                result.innerHTML = `<span class="success">✅ HEALTHY</span><br>
                                   Status: ${data.status}<br>
                                   Version: ${data.version}<br>
                                   Time: ${data.timestamp}`;
            } catch (error) {
                result.innerHTML = `<span class="error">❌ ERROR: ${error.message}</span>`;
            }
        }
        
        async function testUsers() {
            const result = document.getElementById('users-result');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('/api/users?limit=5');
                const data = await response.json();
                
                if (data.success) {
                    const users = data.data.rows || [];
                    result.innerHTML = `<span class="success">✅ ${users.length} USERS FOUND</span><br>
                                       Total: ${data.data.total} users<br><br>`;
                    
                    users.forEach(user => {
                        result.innerHTML += `• ${user.nickName} (${user.id}): ${user.total_weight}kg, ${user.total_points} points<br>`;
                    });
                } else {
                    result.innerHTML = `<span class="error">❌ API Error: ${data.error}</span>`;
                }
            } catch (error) {
                result.innerHTML = `<span class="error">❌ ERROR: ${error.message}</span>`;
            }
        }
        
        async function testMachines() {
            const result = document.getElementById('machines-result');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('/api/user-analytics?endpoint=stats');
                const data = await response.json();
                
                result.innerHTML = `<span class="success">✅ MACHINE STATUS</span><br>
                                   Active: ${data.activeMachines}/${data.totalMachines} machines<br>
                                   Last updated: ${data.lastUpdated}`;
            } catch (error) {
                result.innerHTML = `<span class="error">❌ ERROR: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
