<!DOCTYPE html>
<html>
<head>
    <title>RVM Admin Dashboard</title>
    <style>
        body { font-family: Arial; padding: 40px; text-align: center; background: #f5f7fa; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 20px; }
        .status { background: #f8f9fa; padding: 20px; border-radius: 10px; margin: 20px 0; text-align: left; }
        .status-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .btn { background: #667eea; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; margin: 10px; }
        .btn:hover { background: #5a6fd8; }
        .logout { background: #dc3545; }
        .logout:hover { background: #c82333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RVM Admin Dashboard</h1>
        <p>欢迎回来，管理员！系统状态正常。</p>
        
        <div class="status">
            <h3>系统状态</h3>
            <div class="status-item">
                <span>后端API服务</span>
                <span style="color: #28a745;">✅ 在线</span>
            </div>
            <div class="status-item">
                <span>用户数据</span>
                <span>1,128 用户</span>
            </div>
            <div class="status-item">
                <span>数据同步</span>
                <span style="color: #28a745;">✅ 正常</span>
            </div>
            <div class="status-item">
                <span>机器 #071582000007</span>
                <span style="color: #dc3545;">⚠️ 需要维护</span>
            </div>
        </div>
        
        <div>
            <button class="btn" onclick="alert('用户管理功能开发中')">用户管理</button>
            <button class="btn" onclick="alert('报告生成功能开发中')">生成报告</button>
            <button class="btn" onclick="alert('机器监控功能开发中')">机器监控</button>
            <button class="btn logout" onclick="window.location.href='/'">退出登录</button>
        </div>
        
        <p style="margin-top: 30px; color: #666;">
            HMA Digital Sdn Bhd &copy; 2026<br>
            技术支持: support@mygreenplus.com
        </p>
    </div>
    
    <script>
        // 检查API状态
        fetch('/api/health')
            .then(r => r.json())
            .then(data => console.log('API状态:', data))
            .catch(e => console.error('API检查失败:', e));
    </script>
</body>
</html>
